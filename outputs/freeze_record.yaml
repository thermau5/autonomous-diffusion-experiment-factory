contract_version: 1
project: autonomous_diffusion_real_image_verification
frozen_fields:
- datasets
- model_policy
- baselines
- metrics.primary
- success
- forbidden
- budgets.nfe_grid
- budgets.seeds
- proposed_calibration_defaults
snapshot:
  datasets:
    primary:
    - name: cifar10
      resolution: 32
      samples_eval: 10000
      samples_validation: 10000
      samples_smoke: 1024
      fid_reference_split: train
    secondary:
    - name: ffhq
      resolution: 64
      samples_eval: 50000
      samples_validation: 10000
      samples_smoke: 1024
      fid_reference_split: trainval
    - name: afhqv2
      resolution: 64
      samples_eval: 50000
      samples_validation: 10000
      samples_smoke: 1024
      fid_reference_split: train
  model_policy:
    use_pretrained_models: true
    retrain_generator: false
    modify_only:
    - sampler
    - schedule
    - control
    pretrained_sources:
      cifar10: https://nvlabs-fi-cdn.nvidia.com/edm/pretrained/edm-cifar10-32x32-uncond-vp.pkl
      ffhq: https://nvlabs-fi-cdn.nvidia.com/edm/pretrained/edm-ffhq-64x64-uncond-vp.pkl
      afhqv2: https://nvlabs-fi-cdn.nvidia.com/edm/pretrained/edm-afhqv2-64x64-uncond-vp.pkl
  baselines:
  - id: edm_euler
    family: edm
    notes: Karras 2022, Algorithm 1 with first-order Euler steps
  - id: edm_heun
    family: edm
    notes: Karras 2022, Algorithm 1 (Heun 2nd-order); reference deterministic sampler
  - id: ddim
    family: diffusers
    notes: Song et al 2020
  - id: ddpm_ancestral
    family: diffusers
    notes: Ho et al 2020 ancestral sampling on the same pretrained net
  - id: dpm_solver
    family: diffusers
    notes: Lu et al 2022 (1st gen)
  - id: dpm_solver_pp
    family: diffusers
    notes: Lu et al 2022 ++ multistep
  - id: unipc
    family: diffusers
    notes: Zhao et al 2023
  - id: deis
    family: diffusers
    notes: Zhang & Chen 2022
  - id: pndm
    family: diffusers
    notes: Liu et al 2022
  - id: restart
    family: custom
    notes: Xu et al 2023 restart sampling
  - id: uniform_schedule
    family: schedule_baseline
    notes: Uniform spacing in t over the same EDM solver
  - id: karras_schedule
    family: schedule_baseline
    notes: Karras rho=7 schedule as a baseline control u_base
  metrics.primary:
  - clean_fid
  - nfe
  - wall_clock_seconds
  - pareto_auc_fid_nfe
  - risk_violation_rate
  success:
    primary:
      metric: pareto_auc_fid_nfe
      improvement_over_best_baseline: 0.05
    secondary:
      metric: clean_fid_at_matched_nfe
      improvement_over_best_baseline: 0.03
    risk:
      metric: risk_violation_rate
      must_be_at_most: 0.05
  forbidden:
  - tune_on_locked_test
  - remove_baseline_after_failure
  - change_primary_metric_after_results
  - report_best_seed_only
  - use_test_split_for_validation
  - silently_skip_baseline_on_OOM
  - retrain_generator_without_contract_bump
  budgets.nfe_grid:
  - 5
  - 8
  - 12
  - 18
  - 32
  - 64
  budgets.seeds:
  - 0
  - 1
  - 2
  - 3
  - 4
  proposed_calibration_defaults:
    proposed_heun:
      per_core_calib: false
      perceptual_weight_k: 2.0
      rationale: Heun's d_s is the reference; no separate per-core branch.
    proposed_dpmpp:
      per_core_calib: true
      perceptual_weight_k: 2.0
      rationale: 'Round 3b: per-core wins -8.12/-3.19/-1.58/-0.43 at NFE 5/8/12/18.'
    proposed_unipc:
      per_core_calib: true
      perceptual_weight_k: 2.0
      rationale: 'Round 3b: per-core wins -9.49/-3.36/-1.66/-0.35 at NFE 5/8/12/18.'
    proposed_deis:
      per_core_calib: false
      perceptual_weight_k: 2.0
      rationale: 'Round 3b: per-core LOSES +25.5/+13.2/+7.2/+3.7 (extrapolation kernel
        residual dominates d_DEIS); shared d_Heun is the default.'
    proposed_restart:
      per_core_calib: false
      perceptual_weight_k: 2.0
      rationale: Restart wraps Heun base + cycle structure; per-core not applicable.
sha256: 450925ba07910f5d1c09d3136e2663c91dee29e118ddc6795a28b6c0643dd139
